<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi TSMEL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --i: #3498db; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .app-info { display: flex; gap: 10px; margin-bottom: 20px; padding: 10px; background: #eee; }
        .nav { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; border: none; background: #ddd; }
        .tab-btn.active { background: var(--p); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        .saveable { width: 100%; }
        .chart { width: 400px; margin: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>Suivi TSMEL</h1>
    <div class="app-info">
        <input type="text" id="nom" class="saveable" placeholder="Nom">
        <input type="text" id="prenom" class="saveable" placeholder="Prénom">
    </div>
    <div class="nav">
        <button class="tab-btn active" id="b1" onclick="go('t1')">1. Formateur</button>
        <button class="tab-btn" id="b2" onclick="go('t2')">2. Auto-évaluation</button>
    </div>
    <div id="t1" class="tab-content active">
        <table>
            <tr><th>CP</th><th>Statut</th><th>Notes</th></tr>
            <tr><td>CP1</td><td><select id="s1" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o1" class="saveable"></textarea></td></tr>
            <tr><td>CP2</td><td><select id="s2" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o2" class="saveable"></textarea></td></tr>
            <tr><td>CP3</td><td><select id="s3" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o3" class="saveable"></textarea></td></tr>
            <tr><td>CP4</td><td><select id="s4" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o4" class="saveable"></textarea></td></tr>
            <tr><td>CP5</td><td><select id="s5" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o5" class="saveable"></textarea></td></tr>
            <tr><td>CP6</td><td><select id="s6" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o6" class="saveable"></textarea></td></tr>
            <tr><td>CP7</td><td><select id="s7" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o7" class="saveable"></textarea></td></tr>
            <tr><td>CP8</td><td><select id="s8" class="saveable"><option>À débuter</option><option>Acquis</option></select></td><td><textarea id="o8" class="saveable"></textarea></td></tr>
        </table>
    </div>
    <div id="t2" class="tab-content">
        <div class="chart"><canvas id="radar"></canvas></div>
        <table>
            <tr><th>CP</th><th>Note (1-4)</th><th>Preuves</th></tr>
            <tr><td>CP1</td><td><input type="number" id="ae1" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n1" class="saveable"></textarea></td></tr>
            <tr><td>CP2</td><td><input type="number" id="ae2" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n2" class="saveable"></textarea></td></tr>
            <tr><td>CP3</td><td><input type="number" id="ae3" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n3" class="saveable"></textarea></td></tr>
            <tr><td>CP4</td><td><input type="number" id="ae4" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n4" class="saveable"></textarea></td></tr>
            <tr><td>CP5</td><td><input type="number" id="ae5" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n5" class="saveable"></textarea></td></tr>
            <tr><td>CP6</td><td><input type="number" id="ae6" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n6" class="saveable"></textarea></td></tr>
            <tr><td>CP7</td><td><input type="number" id="ae7" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n7" class="saveable"></textarea></td></tr>
            <tr><td>CP8</td><td><input type="number" id="ae8" min="1" max="4" class="saveable radar-input"></td><td><textarea id="n8" class="saveable"></textarea></td></tr>
        </table>
    </div>
</div>
<script>
    let radar;
    function go(id) {
        document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('b' + id.slice(1)).classList.add('active');
        if(id === 't2' && radar) radar.update();
    }
    function init() {
        radar = new Chart(document.getElementById('radar'), {
            type: 'radar',
            data: {
                labels: ['CP1','CP2','CP3','CP4','CP5','CP6','CP7','CP8'],
                datasets: [{ label: 'Profil', data: [0,0,0,0,0,0,0,0], backgroundColor: 'rgba(52,152,219,0.2)', borderColor: '#2980b9' }]
            },
            options: { scales: { r: { min: 0, max: 4 } } }
        });
    }
    function up() {
        const d = [];
        for(let i=1; i<=8; i++) d.push(parseFloat(document.getElementById('ae'+i).value) || 0);
        radar.data.datasets[0].data = d;
        radar.update();
    }
    const els = document.querySelectorAll('.saveable');
    function save() {
        const d = {};
        els.forEach(e => d[e.id] = e.value);
        localStorage.setItem('tsmel_data', JSON.stringify(d));
        if(this.classList.contains('radar-input')) up();
    }
    function load() {
        const d = JSON.parse(localStorage.getItem('tsmel_data'));
        if(d) els.forEach(e => { if(d[e.id]!==undefined) e.value = d[e.id]; });
        up();
    }
    els.forEach(e => e.addEventListener('input', save));
    window.onload = () => { init(); load(); };
</script>
</body>
</html>
